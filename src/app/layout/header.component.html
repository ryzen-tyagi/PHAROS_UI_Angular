<header class="relative w-full flex items-center h-[6.5vh] bg-black p-4 px-8 md:px-4 border-b border-[#878787]">
  <!-- Left -->
  <div class="flex gap-4 absolute left-8 md:left-4">
    <button
      class="w-10 h-10 rounded-md text-white text-2xl transition duration-150 border border-[rgba(45,150,255,1)] bg-[rgba(45,150,255,0.5)] hover:bg-[rgba(45,150,255,1)] flex items-center justify-center"
      (click)="goHome()"
    >
      <lucide-icon [img]="House" class="h-6 w-6"></lucide-icon>
    </button>
  </div>

  <!-- Center title -->
  <div class="absolute left-1/2 -translate-x-1/2 text-white font-bold text-2xl tracking-wide text-center whitespace-nowrap">
    {{ title() }}
  </div>

  <!-- Right -->
  <div class="flex gap-4 items-center absolute right-8 md:right-4">
    <div class="text-white w-[10vw] text-sm flex flex-col leading-tight text-right">
      <div class="flex items-center gap-1 mb-1 justify-end">
        <lucide-icon [img]="Clock" class="h-4 w-4"></lucide-icon>
        <span class="inline-block min-w-[120px] text-right tabular-nums">{{ formatTime(now()) }} PST</span>
      </div>
      <div>{{ formatDate(now()) }} | {{ dayName(now()) }}</div>
    </div>

    <button class="w-10 h-10 rounded-md text-white text-2xl transition duration-150 border border-[rgba(45,150,255,1)] bg-[rgba(45,150,255,0.5)] hover:bg-[rgba(45,150,255,1)] flex items-center justify-center">
      <lucide-icon [img]="User" class="h-5 w-5"></lucide-icon>
    </button>

    <button
      (click)="showConfirm.set(true)"
      class="w-10 h-10 rounded-md text-white text-2xl transition duration-150 border border-[rgba(45,150,255,1)] bg-[rgba(45,150,255,0.5)] hover:bg-[rgba(45,150,255,1)] flex items-center justify-center"
    >
      <lucide-icon [img]="Power" class="h-5 w-5"></lucide-icon>
    </button>
  </div>

  <!-- Confirm logout modal -->
  @if (showConfirm()) {
    <div class="fixed inset-0 bg-[#00000080] flex items-center justify-center z-[60]">
      <div class="bg-[#2a2a2a] border border-[#5E5E5E] rounded-lg p-6 w-[26vw] text-center">
        <h2 class="text-white text-lg font-semibold mb-4">Confirm logout?</h2>
        <p class="text-gray-300 mb-5">Are you sure you want to logout?</p>
        <div class="flex justify-center gap-4">
          <button (click)="confirmLogout()" class="bg-[#00A6E2] text-white px-4 py-2 rounded-md hover:bg-[#0096d2] transition-colors">Yes</button>
          <button (click)="showConfirm.set(false)" class="border border-white text-white px-4 py-2 rounded-md hover:bg-[#2a2a2a] transition-colors">Cancel</button>
        </div>
      </div>
    </div>
  }
</header>
